<!DOCTYPE html>
<html lang="ms">
<head>
  <title>e-Maklum Balas Pelanggan</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    /* Container untuk iframe */
    .iframe-wrapper {
      width: 100%;
      max-width: 900px;
      height: calc(100vh - 100px); /* Tidak fullscreen, ada ruang */
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      border: 3px solid white;
    }
    
    /* iFrame */
    .survey-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    
    /* Info kecil di bawah */
    .info-text {
      margin-top: 15px;
      text-align: center;
      color: #4a5568;
      font-size: 0.8rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      
      .iframe-wrapper {
        height: calc(100vh - 80px);
      }
    }
    
    @media (max-width: 480px) {
      body {
        padding: 5px;
      }
      
      .iframe-wrapper {
        height: calc(100vh - 60px);
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="iframe-wrapper">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbzz_21xmCJDByVaZfiqb3ss-FsuDkw1zgSoCiGd-nCYz-dGC8xQxDeMrVdxkY4-kr7A/exec"
      class="survey-frame"
      title="Borang Maklum Balas Pelanggan"
      allowfullscreen="true">
    </iframe>
  </div>
  
  <p class="info-text">Borang Soal Selidik - Jabatan Imigresen Malaysia Sarawak</p>
</body>
</html>
